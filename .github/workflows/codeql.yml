name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
jobs:
  analyze:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: actions
      - uses: github/codeql-action/analyze@v4
